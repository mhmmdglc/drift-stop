name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx jest --ci

      # `expo lint` is intentionally not a required gate: the React Compiler
      # rules it ships with currently misfire on Reanimated's `.value =`
      # mutation API (its intended usage, not a bug) and on legitimate
      # async-effect setState patterns already used elsewhere in this repo.
      # Runs for visibility only, never fails the build.
      - name: Lint (non-blocking)
        run: npx expo lint || true

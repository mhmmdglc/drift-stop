<!doctype html>
<html><head><meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Kalam:wght@400&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1024px; height:500px; overflow:hidden; }
  .fg {
    width:1024px; height:500px; position:relative;
    background:#1C1A16; color:#F0EAD6;
    display:flex; flex-direction:column; justify-content:center;
    padding-left:90px;
    font-family:'Kalam',cursive;
  }
  .margin { position:absolute; left:54px; top:0; bottom:0; width:2px; background:#C4503A; opacity:.35; }
  .title { font-family:'Caveat',cursive; font-size:128px; line-height:1; color:#F0EAD6; letter-spacing:2px; }
  .tag { font-size:34px; color:#C8923A; margin-top:14px; letter-spacing:1px; }
  .sub { font-size:20px; color:#9C9075; margin-top:6px; }
  .stroke { width:300px; height:5px; background:#C8923A; border-radius:3px; margin-top:18px; }
  .flame { position:absolute; right:120px; top:50%; transform:translateY(-50%); }
  .dot { position:absolute; width:3px; height:3px; border-radius:50%; background:#F0EAD6; opacity:.10; }
</style></head>
<body>
  <div class="fg">
    <div class="margin"></div>
    <div class="dot" style="left:140px;top:80px"></div>
    <div class="dot" style="left:420px;top:60px"></div>
    <div class="dot" style="left:700px;top:120px"></div>
    <div class="dot" style="left:560px;top:420px"></div>
    <div class="dot" style="left:240px;top:400px"></div>
    <div class="title">DriftStop</div>
    <div class="stroke"></div>
    <div class="tag">Sürüklenme.</div>
    <div class="sub">Hard quotes. Right when you start to drift.</div>
    <svg class="flame" width="180" height="220" viewBox="0 0 24 24" fill="none">
      <path d="M12,2 Q16.5,8 14.5,13 Q13.2,16 11,13.8 Q10.2,12.6 11,11.2 Q7.6,13.6 8.2,17.6 Q8.9,22 13,21.6 Q18,21 17.2,15.6 Q16.4,8.6 12,2 Z"
        stroke="#C8923A" stroke-width="1.3" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>
  </div>
</body></html>
